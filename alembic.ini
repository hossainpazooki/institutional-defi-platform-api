# Alembic configuration for Institutional DeFi Platform API

[alembic]
# Path to migration scripts
script_location = alembic

# File template — timestamp-prefixed for chronological ordering
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Truncate slug to 40 chars
truncate_slug_length = 40

# Timezone for file_template timestamps
# timezone =

# sys.path prepend — project root so "src.*" imports resolve
prepend_sys_path = .

# Fallback database URL (overridden by env.py from src.config)
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/institutional_defi

# Post-write hooks — format migrations with ruff
[post_write_hooks]
hooks = ruff_format, ruff_lint

ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

ruff_lint.type = exec
ruff_lint.executable = ruff
ruff_lint.options = check --fix REVISION_SCRIPT_FILENAME

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
