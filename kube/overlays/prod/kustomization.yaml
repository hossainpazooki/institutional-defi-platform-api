apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: institutional-defi

resources:
  - ../../base
  - configmap.yaml
  - ingress.yaml
  - egress.yaml

# Production replicas
replicas:
  - name: api
    count: 3
  - name: worker
    count: 2

# Production image tags (semantic version)
images:
  - name: institutional-defi-api
    newName: ${ECR_REGISTRY}/institutional-defi-api
    newTag: ${IMAGE_TAG}
  - name: institutional-defi-worker
    newName: ${ECR_REGISTRY}/institutional-defi-worker
    newTag: ${IMAGE_TAG}

# IRSA annotations for service accounts
patches:
  # IRSA annotation for API service account
  - patch: |-
      - op: add
        path: /metadata/annotations
        value:
          eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/institutional-defi-api-sa
    target:
      kind: ServiceAccount
      name: api-sa

  # IRSA annotation for worker service account
  - patch: |-
      - op: add
        path: /metadata/annotations
        value:
          eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/institutional-defi-worker-sa
    target:
      kind: ServiceAccount
      name: worker-sa

commonLabels:
  environment: production
