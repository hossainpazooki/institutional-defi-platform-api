apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: institutional-defi-dev

resources:
  - ../../base
  - configmap.yaml
  - ingress.yaml
  - egress.yaml

nameSuffix: -dev

# Dev uses minimal replicas
replicas:
  - name: api
    count: 1
  - name: worker
    count: 1

# Dev image tags
images:
  - name: institutional-defi-api
    newName: ${ECR_REGISTRY}/institutional-defi-api
    newTag: latest
  - name: institutional-defi-worker
    newName: ${ECR_REGISTRY}/institutional-defi-worker
    newTag: latest

# Reduce resources for dev
patches:
  # API deployment patches
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
    target:
      kind: Deployment
      name: api

  # Worker deployment patches
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "64Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "125m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "128Mi"
    target:
      kind: Deployment
      name: worker

  # Disable HPA for dev (fixed replicas)
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 1
    target:
      kind: HorizontalPodAutoscaler

  # IRSA annotation for API service account
  - patch: |-
      - op: add
        path: /metadata/annotations
        value:
          eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/institutional-defi-api-sa
    target:
      kind: ServiceAccount
      name: api-sa

  # IRSA annotation for worker service account
  - patch: |-
      - op: add
        path: /metadata/annotations
        value:
          eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/institutional-defi-worker-sa
    target:
      kind: ServiceAccount
      name: worker-sa

commonLabels:
  environment: dev
