apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  ENVIRONMENT: local
  DEBUG: "true"
  ENABLE_VECTOR_SEARCH: "false"
  ENABLE_FEATURE_STORE: "false"
  ENABLE_DECODER_SERVICE: "false"
  TEMPORAL_NAMESPACE: "default"
  TEMPORAL_TASK_QUEUE: "regulatory-workflows"
  TEMPORAL_HOST: "host.minikube.internal:7233"
  CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:30080"
  LOG_LEVEL: "DEBUG"
  LOG_FORMAT: "console"
