apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: institutional-defi

resources:
  - ../../base
  - configmap.yaml
  - secrets.yaml

# Local uses minimal replicas
replicas:
  - name: api
    count: 1
  - name: worker
    count: 1

# Local image tags (built with minikube docker-env)
images:
  - name: institutional-defi-api
    newTag: local
  - name: institutional-defi-worker
    newTag: local

# Patches for local environment
patches:
  # Delete external-secret (use local secrets.yaml instead)
  - patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: api-secrets
    target:
      kind: ExternalSecret
      name: api-secrets

  # Delete all HPAs (not needed locally)
  - patch: |-
      $patch: delete
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: placeholder
    target:
      kind: HorizontalPodAutoscaler

  # Delete all PDBs (not needed locally with single replica)
  - patch: |-
      $patch: delete
      apiVersion: policy/v1
      kind: PodDisruptionBudget
      metadata:
        name: placeholder
    target:
      kind: PodDisruptionBudget

  # Reduce resource requests for local
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "50m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "128Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"
    target:
      kind: Deployment

  # Convert API service to NodePort
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
      - op: add
        path: /spec/ports/0/nodePort
        value: 30080
    target:
      kind: Service
      name: api

  # Disable readOnlyRootFilesystem for local (needed for tmp files)
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/securityContext/readOnlyRootFilesystem
        value: false
    target:
      kind: Deployment
      name: api

commonLabels:
  environment: local
