apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: institutional-defi

resources:
  - namespace.yaml
  - api/serviceaccount.yaml
  - api/deployment.yaml
  - api/service.yaml
  - api/hpa.yaml
  - api/external-secret.yaml
  - api/pdb.yaml
  - worker/serviceaccount.yaml
  - worker/deployment.yaml
  - worker/hpa.yaml
  - worker/pdb.yaml

commonLabels:
  app.kubernetes.io/part-of: institutional-defi-platform
  app.kubernetes.io/managed-by: kustomize
