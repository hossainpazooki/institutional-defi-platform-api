apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: institutional-defi/database
        property: url
    - secretKey: REDIS_URL
      remoteRef:
        key: institutional-defi/redis
        property: url
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: institutional-defi/anthropic
        property: api_key
