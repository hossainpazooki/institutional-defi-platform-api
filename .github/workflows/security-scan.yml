name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: us-east-1

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit

      - name: Run pip-audit
        run: pip-audit --strict --desc

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SAST tools
        run: pip install bandit semgrep

      - name: Run Bandit
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Run Semgrep
        run: semgrep --config=p/python --json --output=semgrep-report.json src/ || true

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json
            semgrep-report.json

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t institutional-defi-api:scan .

      - name: Build Worker image
        run: docker build -f Dockerfile.worker -t institutional-defi-worker:scan .

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: institutional-defi-api:scan
          format: sarif
          output: api-trivy.sarif

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: institutional-defi-worker:scan
          format: sarif
          output: worker-trivy.sarif

      - name: Upload API scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: api-trivy.sarif
          category: container-api

      - name: Upload Worker scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: worker-trivy.sarif
          category: container-worker

  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Scan Terraform
        run: checkov -d terraform/ --framework terraform --output json --output-file checkov-terraform.json || true

      - name: Scan Kubernetes manifests
        run: checkov -d kube/ --framework kubernetes --output json --output-file checkov-kube.json || true

      - name: Upload IaC scan reports
        uses: actions/upload-artifact@v4
        with:
          name: iac-reports
          path: |
            checkov-terraform.json
            checkov-kube.json
