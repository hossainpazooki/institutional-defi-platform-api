name: CD Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (must match vX.Y.Z)"
        required: true
        type: string

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: institutional-defi-eks
  NAMESPACE: institutional-defi

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver format
        run: |
          if [[ ! "${{ inputs.image_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: image_tag must match vX.Y.Z format (got: ${{ inputs.image_tag }})"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify images exist in ECR
        run: |
          REGISTRY=${{ steps.ecr.outputs.registry }}
          TAG=${{ inputs.image_tag }}

          echo "Checking API image..."
          aws ecr describe-images --repository-name institutional-defi-api --image-ids imageTag=$TAG

          echo "Checking Worker image..."
          aws ecr describe-images --repository-name institutional-defi-worker --image-ids imageTag=$TAG

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Record current image for rollback
        id: rollback
        run: |
          CURRENT=$(kubectl get deployment api -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
          echo "current-image=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current image: $CURRENT"

      - name: Deploy to production
        run: |
          export ECR_REGISTRY=${{ steps.ecr.outputs.registry }}
          export IMAGE_TAG=${{ inputs.image_tag }}
          kustomize build kube/overlays/prod | envsubst | kubectl apply -f -

      - name: Wait for rollout
        id: rollout
        run: |
          kubectl rollout status deployment/api -n ${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/worker -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Health check
        id: health
        run: |
          API_URL=$(kubectl get ingress -n ${{ env.NAMESPACE }} -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${API_URL}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Auto-rollback on failure
        if: failure() && (steps.rollout.outcome == 'failure' || steps.health.outcome == 'failure')
        run: |
          echo "Rolling back deployments..."
          kubectl rollout undo deployment/api -n ${{ env.NAMESPACE }}
          kubectl rollout undo deployment/worker -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/api -n ${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/worker -n ${{ env.NAMESPACE }} --timeout=300s
          echo "Rollback complete"

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.image_tag }}
          name: Release ${{ inputs.image_tag }}
          body: |
            Production deployment of ${{ inputs.image_tag }}
            Deployed by: ${{ github.actor }}
          generate_release_notes: true

      - name: Notify success
        if: success()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"Production deploy succeeded: ${{ inputs.image_tag }}\"}" || true

      - name: Notify failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"Production deploy FAILED (auto-rollback triggered): ${{ inputs.image_tag }}\"}" || true
